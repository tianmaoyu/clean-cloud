version: '3.8'

networks:
  kafka-net:
    driver: bridge

services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"      # SASL_PLAINTEXT 客户端连接端口
      - "9093:9093"      # Controller 内部通信端口
    networks:
      - kafka-net
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro   # JAAS 配置（只读）
      - ./kafka_data:/var/lib/kafka/data                                 # 数据持久化目录
    environment:
      # --- KRaft 基础配置 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- 监听器配置 ---
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://192.168.7.100:9092   # 根据您宿主机实际 IP 修改
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT

      # --- KRaft 集群投票者 ---
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # --- 主题与存储 ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # --- JVM 内存 ---
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"

      # --- SASL 认证 ---
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"

      # --- ACL 授权 ---
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      # Controller 与 Broker 之间的内部通信通 User:ANONYMOUS
      KAFKA_SUPER_USERS: User:admin;User:ANONYMOUS

    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"
    networks:
      - kafka-net
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-kafka"
      # 使用容器名 kafka（同网络内可直接解析），而不是宿主机 IP
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # SASL 连接配置
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-pass";
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped