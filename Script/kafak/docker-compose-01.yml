version: '3.8'
networks:
  kafka-net:
    driver: bridge

services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"          # 对外暴露的 Kafka 端口（客户端连接）
      - "9093:9093"          # 可选的控制器端口，通常不需要对外暴露
    networks:
      - kafka-net
    environment:
      # KRaft 模式配置
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 监听所有网络接口，允许外部访问
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # 广播给客户端的地址：
      #  - 宿主机外部：使用宿主机实际 IP（或域名）
      #  - 同一 Docker 网络内其他容器：使用容器名 "kafka:9092"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.168.7.100:9092   # 请替换为宿主机实际 IP
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093                 # 容器内通信，使用容器名
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # 可选：加大内存限制（根据实际需要调整）
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    restart: unless-stopped

  kafka-ui:
    image: rootpublic/kafka-ui:0.7.2_rootio   # 推荐 Kafbat UI，更活跃
    # 或者使用 confluentinc/cp-kafka-ui 等其他镜像
    container_name: kafka-ui
    ports:
      - "8082:8080"          # UI 界面访问端口
    networks:
      - kafka-net
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"   # 允许动态配置
      KAFKA_CLUSTERS_0_NAME: "local"
      # 连接 Kafka：使用容器名 "kafka" 和内部端口 9092
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # 如果需要认证等，可添加对应配置
    depends_on:
      - kafka
    restart: unless-stopped